name: Close stale "waiting for reply" issues and PRs

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          only-labels: 'waiting for reply'
          days-before-issue-stale: 30
          days-before-issue-close: 30
          stale-issue-label: 'waiting for reply'
          remove-stale-when-updated: true
          close-issue-message: >
            Closing this for now since we haven't heard back on the follow-up
            questions. If you're still seeing this on a recent version, just
            drop a comment with the requested info and we'll reopen. Thanks
            for the report!
          stale-pr-label: 'waiting for reply'
          days-before-pr-stale: 30
          days-before-pr-close: 14
          close-pr-message: >
            Closing this since we haven't heard back on the open review
            questions. If you're still interested in landing this, answer
            them in a comment and we'll reopen.
          operations-per-run: 100
